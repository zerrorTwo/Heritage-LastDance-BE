version: '3.9'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: local
      HOST: ${HOST:-mysql}
      PORT_DB: ${PORT_DB:-3306}
      USERNAME: ${USERNAME:-heritage}
      PASSWORD: ${PASSWORD:-heritage_pass}
      NAME: ${NAME:-heritage_db}
    volumes:
      - ./configs:/app/configs:ro
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-heritage_db}
      MYSQL_USER: ${DB_USER:-heritage}
      MYSQL_PASSWORD: ${DB_PASS:-heritage_pass}
    ports:
      - '3306:3306'
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${DB_ROOT_PASS:-rootpass}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysqldata:
