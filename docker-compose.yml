version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: aioz
      POSTGRES_PASSWORD: aiozpass
      POSTGRES_DB: aioz_map
    ports:
      - "5432:5432"
  app:
    build: .
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: docker
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: aioz
      DATABASE_PASS: aiozpass
      DATABASE_NAME: aioz_map
      JWT_SECRET: devsecret
      JWT_EXPIRES_IN: 1h
      SESSION_TTL_HOURS: 24
      REFRESH_TOKEN_TTL_DAYS: 7
      MAIL_HOST: smtp.example.com
      MAIL_PORT: 587
      MAIL_USER: noreply@example.com
      MAIL_PASS: secret
      MAIL_FROM: "AIOZ <noreply@example.com>"
